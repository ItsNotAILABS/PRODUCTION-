# ============================================================================
# organism-sandcastle-bot — Sandboxed Build, Test & Land Pipeline
#
# Internal sandcastle system inspired by Meta's internal tooling. Runs a
# full sandboxed build of every SDK, every extension, and all organism
# runtimes. Runs integration smoke tests that verify cross-module wiring.
# On PRs: stamps with "sandcastle-approved" label when all checks pass.
# On main: produces a full sandcastle build report with timing + artifact sizes.
#
# Identity: organism-sandcastle-bot <organism-sandcastle-bot@users.noreply.github.com>
# ============================================================================

name: "🏰 Sandcastle Build-Test-Land"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sandcastle-build:
    name: "🏰 Full Sandcastle Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Phase 1 — Validate all manifests"
        run: node scripts/sandcastle-pipeline.js --validate

      - name: "Phase 2 — Build all SDKs"
        run: node scripts/sandcastle-pipeline.js --build-sdks

      - name: "Phase 3 — Build all extensions"
        run: node scripts/sandcastle-pipeline.js --build-extensions

      - name: "Phase 4 — Integration smoke tests"
        run: node scripts/sandcastle-pipeline.js --integration

      - name: "Phase 5 — Cross-module wiring verification"
        run: node scripts/sandcastle-pipeline.js --wiring

      - name: "Phase 6 — Generate sandcastle report"
        run: node scripts/sandcastle-pipeline.js --report

      - name: Upload sandcastle report
        uses: actions/upload-artifact@v4
        with:
          name: sandcastle-report-${{ github.sha }}
          path: docs/sandcastle-report.md
          retention-days: 14

      - name: Label PR as sandcastle-approved
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['sandcastle-approved']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🏰 **Sandcastle-bot:** All phases passed. Build-test-land pipeline approved.\n\n' +
                    '✅ Manifests validated\n' +
                    '✅ SDKs built\n' +
                    '✅ Extensions built\n' +
                    '✅ Integration tests passed\n' +
                    '✅ Cross-module wiring verified'
            });

      - name: Commit sandcastle report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-sandcastle-bot"
          git config user.email "organism-sandcastle-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No sandcastle report changes to commit"
          else
            git commit -m "🏰 Sandcastle-bot: full build-test-land report updated"
            git push
          fi
