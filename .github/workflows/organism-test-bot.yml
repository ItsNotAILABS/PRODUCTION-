# ============================================================================
# organism-test-bot — Cross-Matrix Test Runner & Coverage Reporter
#
# Runs the full test suite across Node 18/20/22, generates coverage reports,
# validates CLI tools, SDK modules, and extension manifests. Produces a
# test-results summary that gets committed as a living health dashboard.
#
# Identity: organism-test-bot <organism-test-bot@users.noreply.github.com>
# ============================================================================

name: "🧪 Test & Coverage Bot"

on:
  push:
    branches: [main]
    paths:
      - 'test/**'
      - 'sdk/**'
      - 'protocols/**'
      - 'organism-cli/**'
      - 'extensions/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-matrix:
    name: "Test (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate manifests
        run: node scripts/lint-manifests.js

      - name: Run full test suite
        run: node --test test/**/*.test.js 2>&1 | tee /tmp/test-results-${{ matrix.node-version }}.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: /tmp/test-results-${{ matrix.node-version }}.txt
          retention-days: 14

  report:
    name: Generate Test Dashboard
    runs-on: ubuntu-latest
    needs: test-matrix
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate health report
        run: node scripts/generate-test-report.js

      - name: Commit test dashboard
        run: |
          git config user.name "organism-test-bot"
          git config user.email "organism-test-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No test report changes to commit"
          else
            git commit -m "🧪 Test-bot: health dashboard updated (Node 18/20/22)"
            git push
          fi
