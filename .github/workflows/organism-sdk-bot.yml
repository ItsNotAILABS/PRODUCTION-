# ============================================================================
# organism-sdk-bot — SDK Preparation, Validation & Publish Readiness
#
# Normalizes all SDK package.json files, validates exports, checks version
# consistency, and prepares SDKs for npm publish. Handles 19 SDK packages
# across intelligence-routing, sovereign-memory, runtime, agents, and more.
#
# Identity: organism-sdk-bot <organism-sdk-bot@users.noreply.github.com>
# ============================================================================

name: "📦 SDK Validator & Packager"

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-sdks:
    name: Validate & Normalize SDKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate SDK structure
        run: node scripts/validate-sdks.js

      - name: Normalize SDK packages for publish
        run: node scripts/prepare-sdks.js

      - name: Package SDK tarballs
        run: node scripts/validate-sdks.js --package

      - name: Commit SDK artifacts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-sdk-bot"
          git config user.email "organism-sdk-bot@users.noreply.github.com"
          git add sdk/ dist/sdks/
          if git diff --cached --quiet; then
            echo "No SDK changes to commit"
          else
            git commit -m "📦 SDK-bot: validated & packaged SDK modules"
            git push
          fi
