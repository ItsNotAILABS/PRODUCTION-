# ============================================================================
# deploy-marketplace-sdk — Organism Marketplace SDK npm Deployment
#
# Deploys the @medina/organism-marketplace SDK to npm registry. The marketplace
# exposes 24 AI-invocable tools with schema validation, routing, settlement,
# and multi-model adapters (ChatGPT, Claude, etc.).
#
# Deployment Surface:
#   - npm registry (@medina/organism-marketplace)
#   - OpenAPI spec generation
#   - ChatGPT Plugin manifest (ai-plugin.json)
#   - Type definitions bundled
#
# Identity: organism-sdk-bot <organism-sdk-bot@users.noreply.github.com>
# ============================================================================

name: "🔷 Deploy Marketplace SDK"

on:
  push:
    branches: [main]
    paths:
      - 'sdk/organism-marketplace/**'
    tags:
      - 'marketplace-v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch, minor, major, or specific version)'
        required: false
        default: 'patch'
      dry_run:
        description: 'Dry run (validate but do not publish)'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate-sdk:
    name: "🧪 Validate Marketplace SDK"
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate SDK structure
        run: |
          echo "📦 Validating Marketplace SDK structure..."
          
          SDK_PATH="sdk/organism-marketplace"
          
          REQUIRED_FILES=(
            "$SDK_PATH/package.json"
            "$SDK_PATH/src/index.js"
            "$SDK_PATH/src/tool-schema.js"
            "$SDK_PATH/src/tool-registry.js"
            "$SDK_PATH/src/tool-invoker.js"
            "$SDK_PATH/src/marketplace-router.js"
            "$SDK_PATH/src/marketplace-settlement.js"
            "$SDK_PATH/src/chatgpt-adapter.js"
            "$SDK_PATH/src/tools/index.js"
          )
          
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done
          
          # Count tools
          TOOL_COUNT=$(grep -c "Schema\s*," "$SDK_PATH/src/tools/index.js" 2>/dev/null || echo "0")
          echo "📊 Tool schemas exported: $TOOL_COUNT"
          
          echo "✅ SDK structure validation passed"

      - name: Validate exports
        run: |
          echo "🔍 Validating module exports..."
          
          node -e "
            import('file://${PWD}/sdk/organism-marketplace/src/index.js')
              .then(mod => {
                const exports = Object.keys(mod);
                console.log('📋 Exports found:', exports.length);
                exports.forEach(e => console.log('  ✅', e));
                
                // Verify required exports
                const required = ['ToolSchemaBuilder', 'ToolRegistry', 'ToolInvoker', 'MarketplaceRouter', 'MarketplaceSettlement', 'ChatGPTToolAdapter'];
                const missing = required.filter(r => !exports.includes(r));
                
                if (missing.length > 0) {
                  console.error('❌ Missing required exports:', missing);
                  process.exit(1);
                }
                
                console.log('✅ All required exports present');
              })
              .catch(err => {
                console.error('❌ Import failed:', err.message);
                process.exit(1);
              });
          "

      - name: Get current version
        id: version
        run: |
          VERSION=$(node -p "require('./sdk/organism-marketplace/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 Current version: $VERSION"

      - name: Check if should publish
        id: check
        run: |
          # Check if this is a tag push or manual workflow
          if [[ "${{ github.ref }}" == refs/tags/marketplace-v* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "✅ Will publish: tag or manual trigger"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Validation only: not a release trigger"
          fi

  generate-openapi:
    name: "📄 Generate OpenAPI Spec"
    runs-on: ubuntu-latest
    needs: validate-sdk
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate OpenAPI specification
        run: |
          echo "📄 Generating OpenAPI specification..."
          
          mkdir -p dist/marketplace-sdk
          
          node -e "
            import('file://${PWD}/sdk/organism-marketplace/src/index.js')
              .then(async mod => {
                const fs = require('fs');
                
                // Create OpenAPI spec from tool schemas
                const spec = {
                  openapi: '3.1.0',
                  info: {
                    title: 'Organism Marketplace API',
                    version: '${{ needs.validate-sdk.outputs.version }}',
                    description: 'Callable tool marketplace for the sovereign organism — 24 VOIS tools across 4 families'
                  },
                  servers: [
                    { url: 'https://api.organism.ai/v1', description: 'Production' }
                  ],
                  paths: {},
                  components: {
                    schemas: {}
                  }
                };
                
                // Get all families
                const families = mod.ALL_FAMILIES || ['crawling', 'context', 'commander', 'sentry'];
                
                families.forEach(family => {
                  spec.paths[\`/tools/\${family}\`] = {
                    get: {
                      summary: \`List \${family} family tools\`,
                      tags: [family],
                      responses: {
                        '200': {
                          description: 'Tool list',
                          content: { 'application/json': { schema: { type: 'array' } } }
                        }
                      }
                    }
                  };
                });
                
                // Add invoke endpoint
                spec.paths['/invoke'] = {
                  post: {
                    summary: 'Invoke a tool',
                    requestBody: {
                      required: true,
                      content: {
                        'application/json': {
                          schema: {
                            type: 'object',
                            properties: {
                              toolId: { type: 'string' },
                              arguments: { type: 'object' },
                              principalId: { type: 'string' }
                            },
                            required: ['toolId']
                          }
                        }
                      }
                    },
                    responses: {
                      '200': { description: 'Invocation result' },
                      '400': { description: 'Invalid request' },
                      '404': { description: 'Tool not found' }
                    }
                  }
                };
                
                fs.writeFileSync('dist/marketplace-sdk/openapi.json', JSON.stringify(spec, null, 2));
                console.log('✅ OpenAPI spec generated');
              })
              .catch(err => {
                console.error('❌ Generation failed:', err);
                process.exit(1);
              });
          "

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-openapi
          path: dist/marketplace-sdk/openapi.json
          retention-days: 30

  generate-chatgpt-plugin:
    name: "🤖 Generate ChatGPT Plugin"
    runs-on: ubuntu-latest
    needs: validate-sdk
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate ChatGPT Plugin manifest
        run: |
          echo "🤖 Generating ChatGPT Plugin manifest..."
          
          mkdir -p dist/marketplace-sdk
          
          cat > dist/marketplace-sdk/ai-plugin.json << 'EOF'
          {
            "schema_version": "v1",
            "name_for_human": "Organism Marketplace",
            "name_for_model": "organism_marketplace",
            "description_for_human": "Access 24 intelligent tools across 4 families: Crawling, Context, Commander, and Sentry. Perform discovery, monitoring, state reading, orchestration, and security operations.",
            "description_for_model": "The Organism Marketplace provides 24 callable tools organized into 4 families:\n\n🕷 CRAWLING (6 tools): FlowMonitor, PatternSeeker, AnomalyDetector, CacheOptimizer, LogStreamer, TopologyCrawler - for discovery, monitoring, and streaming\n\n🧠 CONTEXT (6 tools): PulseKeeper, StateGuardian, CycleCounter, ContextBuilder, MemoryConsolidator, LineageTracer - for state reading and context assembly\n\n⚡ COMMANDER (6 tools): SyncWeaver, InferEngine, AttentionRouter, ResourceBalancer, ConnectionPool, TaskCommander - for routing and orchestration\n\n🛡 SENTRY (6 tools): SentinelWatch, IntegrityChecker, BoundaryEnforcer, SealVerifier, QueueProcessor, DoctrineAuditor - for security and verification\n\nEach tool has a well-defined schema with input validation, execution metrics, and structured output. Use tools based on the task domain.",
            "auth": {
              "type": "none"
            },
            "api": {
              "type": "openapi",
              "url": "https://itsnotailabs.github.io/PRODUCTION-/dist/marketplace-sdk/openapi.json"
            },
            "logo_url": "https://itsnotailabs.github.io/PRODUCTION-/dist/marketplace-sdk/logo.png",
            "contact_email": "support@organism.ai",
            "legal_info_url": "https://github.com/ItsNotAILABS/PRODUCTION-/blob/main/RIGHTS.md"
          }
          EOF
          
          echo "✅ ChatGPT Plugin manifest generated"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-chatgpt-plugin
          path: dist/marketplace-sdk/ai-plugin.json
          retention-days: 30

  publish-npm:
    name: "🚀 Publish to npm"
    runs-on: ubuntu-latest
    needs: [validate-sdk, generate-openapi, generate-chatgpt-plugin]
    if: needs.validate-sdk.outputs.should_publish == 'true' && github.event.inputs.dry_run != 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Prepare for publish
        run: |
          cd sdk/organism-marketplace
          
          # Copy generated files
          mkdir -p dist
          cp -r ../../artifacts/marketplace-openapi/* dist/ 2>/dev/null || true
          cp -r ../../artifacts/marketplace-chatgpt-plugin/* dist/ 2>/dev/null || true
          
          # Bump version if requested
          if [ "${{ github.event.inputs.version_bump }}" != "" ] && [ "${{ github.event.inputs.version_bump }}" != "patch" ]; then
            npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version
          fi
          
          echo "📦 Package prepared for publish"
          cat package.json

      - name: Publish to npm
        run: |
          cd sdk/organism-marketplace
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report publish success
        run: |
          echo "🚀 Marketplace SDK published successfully!"
          echo "   Package: @medina/organism-marketplace"
          echo "   Version: ${{ needs.validate-sdk.outputs.version }}"

  emit-governance-event:
    name: "🏛️ Emit Governance Event"
    runs-on: ubuntu-latest
    needs: [validate-sdk, generate-openapi, generate-chatgpt-plugin]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Emit SDK validation event
        run: |
          EVENT_FILE="dist/governance/events/marketplace-sdk-$(date -u +%Y-%m-%dT%H-%M-%S-%3NZ).json"
          mkdir -p dist/governance/events
          
          cat > "$EVENT_FILE" << EOF
          {
            "id": "marketplace-sdk-$(date +%s)",
            "type": "SDK_VALIDATION",
            "source": "organism-sdk-bot",
            "subject": "organism-marketplace",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "data": {
              "package": "@medina/organism-marketplace",
              "version": "${{ needs.validate-sdk.outputs.version }}",
              "commit": "$GITHUB_SHA",
              "toolFamilies": ["crawling", "context", "commander", "sentry"],
              "toolCount": 24,
              "openApiGenerated": true,
              "chatGptPluginGenerated": true,
              "published": ${{ needs.validate-sdk.outputs.should_publish }}
            },
            "governance": {
              "pipeline": "pipeline://governance/sdk_cycle",
              "laws_checked": ["SDK_INTEGRITY", "EXPORT_VALIDATION"]
            }
          }
          EOF
          
          echo "🏛️ Governance event emitted: $EVENT_FILE"

      - name: Commit governance event
        run: |
          git config user.name "organism-sdk-bot"
          git config user.email "organism-sdk-bot@users.noreply.github.com"
          git add dist/governance/events/
          if git diff --cached --quiet; then
            echo "No governance events to commit"
          else
            git commit -m "🔷 Marketplace SDK: validation event logged"
            git push
          fi
