# ============================================================================
# organism-alpha-bot — Fleet Commander & Orchestrator
#
# The Alpha bot sits above all other bots. It monitors the health of every
# bot workflow, maintains a fleet census, enforces policies, and can trigger
# any other bot via workflow_dispatch. Runs on every push to main and on a
# schedule to provide continuous fleet oversight.
#
# Authorities:
#   - Trigger any bot workflow
#   - Monitor all workflow run statuses
#   - Create escalation issues for repeated failures
#   - Maintain fleet census report
#   - Enforce commit format and report structure policies
#
# Identity: organism-alpha-bot <organism-alpha-bot@users.noreply.github.com>
# ============================================================================

name: "👑 Alpha Fleet Commander"

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours — continuous oversight
  workflow_dispatch:
    inputs:
      trigger_bot:
        description: 'Bot workflow to trigger (e.g., organism-sentinel-bot)'
        required: false
      action:
        description: 'Action: census | health | trigger | enforce'
        required: false
        default: 'census'

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  alpha-command:
    name: "👑 Fleet Command Center"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Phase 1 — Fleet Census"
        run: node scripts/alpha-fleet-controller.js --census

      - name: "Phase 2 — Health Check"
        run: node scripts/alpha-fleet-controller.js --health
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Phase 3 — Policy Enforcement"
        run: node scripts/alpha-fleet-controller.js --enforce

      - name: "Phase 4 — Generate Fleet Report"
        run: node scripts/alpha-fleet-controller.js --report

      - name: "Phase 5 — Trigger Bot (if requested)"
        if: inputs.trigger_bot != ''
        uses: actions/github-script@v7
        with:
          script: |
            const botName = '${{ inputs.trigger_bot }}';
            const workflowFile = `${botName}.yml`;
            console.log(`👑 Alpha-bot triggering: ${workflowFile}`);
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                ref: 'main',
              });
              console.log(`✅ Successfully triggered ${botName}`);
            } catch (err) {
              console.log(`⚠ Could not trigger ${botName}: ${err.message}`);
            }

      - name: Upload fleet report
        uses: actions/upload-artifact@v4
        with:
          name: fleet-report-${{ github.sha }}
          path: docs/fleet-report.md
          retention-days: 30

      - name: Commit fleet report
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "organism-alpha-bot"
          git config user.email "organism-alpha-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No fleet report changes to commit"
          else
            git commit -m "👑 Alpha-bot: fleet census & health report updated"
            git push
          fi
