# ============================================================================
# organism-cyber-bot — Cyber Defense, Offense Intelligence & Threat Analysis
#
# Full cyber defense stack for the Sovereign Organism. Scans all code for
# threat indicators, maps the external attack surface, computes the defense
# matrix, manages active incidents, and ingests threat intelligence.
# Microbots: threat-scanner, surface-mapper, defense-scorer
#
# Identity: organism-cyber-bot <organism-cyber-bot@users.noreply.github.com>
# ============================================================================

name: "🔐 Cyber Defense & Threat Intelligence"

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'protocols/**'
      - 'sdk/**'
      - 'scripts/**'
  schedule:
    - cron: '0 1 * * *'   # Nightly 1am UTC — daily threat sweep
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  cyber-defense:
    name: "🔐 Cyber Defense Cycle"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Phase 1 — Threat Scan (all code files)"
        run: node scripts/cyber-defense.js --scan

      - name: "Phase 2 — Map Attack Surface"
        run: node scripts/cyber-defense.js --surface

      - name: "Phase 3 — Compute Defense Matrix"
        run: node scripts/cyber-defense.js --matrix

      - name: "Phase 4 — Generate Cyber Report"
        run: node scripts/cyber-defense.js --report

      - name: Upload cyber report
        uses: actions/upload-artifact@v4
        with:
          name: cyber-report-${{ github.sha }}
          path: docs/cyber-report.md
          retention-days: 30

      - name: Commit cyber report
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "organism-cyber-bot"
          git config user.email "organism-cyber-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No cyber report changes"
          else
            git commit -m "🔐 Cyber-bot: threat scan complete — defense matrix updated"
            git push
          fi
