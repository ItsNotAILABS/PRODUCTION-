# ============================================================================
# organism-intel-bot — Intelligence Gathering & Fleet-Wide Awareness
#
# Aggregates intelligence signals from all other bots. Reads their reports,
# cross-correlates findings, detects emerging patterns, and maintains a
# unified "organism intelligence picture" — a single-pane view of
# what everything is learning across the fleet.
#
# Microbots: report-aggregator, pattern-detector, awareness-builder
#
# Identity: organism-intel-bot <organism-intel-bot@users.noreply.github.com>
# ============================================================================

name: "🔭 Intelligence Gathering & Awareness"

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  schedule:
    - cron: '30 */3 * * *'  # Every 3 hours offset — runs after others
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intel-gather:
    name: "🔭 Intelligence Cycle"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Phase 1 — Aggregate all bot reports"
        run: node scripts/intelligence-gather.js --aggregate

      - name: "Phase 2 — Detect cross-bot patterns"
        run: node scripts/intelligence-gather.js --patterns

      - name: "Phase 3 — Build awareness picture"
        run: node scripts/intelligence-gather.js --awareness

      - name: "Phase 4 — Generate intel report"
        run: node scripts/intelligence-gather.js --report

      - name: Commit intel report
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "organism-intel-bot"
          git config user.email "organism-intel-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No intel report changes"
          else
            git commit -m "🔭 Intel-bot: organism intelligence picture updated"
            git push
          fi
