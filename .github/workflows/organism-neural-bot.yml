# ============================================================================
# organism-neural-bot — Deep AI Architecture Integrity
#
# Validates the neural protocol stack, verifies protocol interconnections,
# checks organism runtime modules, and ensures the intelligence substrate
# (protocols/, sdk/agents/, organism/) forms a coherent neural graph.
#
# Identity: organism-neural-bot <organism-neural-bot@users.noreply.github.com>
# ============================================================================

name: "🧠 Neural Architecture Validator"

on:
  push:
    branches: [main]
    paths:
      - 'protocols/**'
      - 'sdk/agents/**'
      - 'organism/**'
      - 'sdk/intelligence-routing-sdk/**'
      - 'sdk/sovereign-memory-sdk/**'
  pull_request:
    branches: [main]
    paths:
      - 'protocols/**'
      - 'sdk/agents/**'
      - 'organism/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-neural-graph:
    name: Validate Neural Protocol Graph
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate protocol exports
        run: node scripts/validate-neural-graph.js

      - name: Generate neural architecture report
        run: node scripts/validate-neural-graph.js --report

      - name: Commit neural report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-neural-bot"
          git config user.email "organism-neural-bot@users.noreply.github.com"
          git add docs/ dist/
          if git diff --cached --quiet; then
            echo "No neural architecture changes to commit"
          else
            git commit -m "🧠 Neural-bot: protocol graph validated & architecture report updated"
            git push
          fi
