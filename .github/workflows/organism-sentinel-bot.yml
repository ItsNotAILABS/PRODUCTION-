# ============================================================================
# organism-sentinel-bot — Security Scanning, Manifest Auditing & Vuln Checks
#
# Scans the entire organism for security issues: manifest permission audits,
# extension CSP validation, SDK dependency vulnerabilities, protocol export
# surface analysis, and governance document integrity checks.
#
# Identity: organism-sentinel-bot <organism-sentinel-bot@users.noreply.github.com>
# ============================================================================

name: "🛡️ Sentinel Security Scanner"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  security-scan:
    name: Full Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit extension permissions
        run: node scripts/sentinel-scan.js --permissions

      - name: Validate CSP policies
        run: node scripts/sentinel-scan.js --csp

      - name: Check for hardcoded secrets
        run: node scripts/sentinel-scan.js --secrets

      - name: Scan protocol export surfaces
        run: node scripts/sentinel-scan.js --protocols

      - name: Generate security report
        run: node scripts/sentinel-scan.js --report

      - name: Commit security report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-sentinel-bot"
          git config user.email "organism-sentinel-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No security report changes to commit"
          else
            git commit -m "🛡️ Sentinel-bot: security scan complete — report updated"
            git push
          fi
