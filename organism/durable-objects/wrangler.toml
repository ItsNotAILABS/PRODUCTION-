name = "vein-of-intelligence"
main = "index.js"
compatibility_date = "2024-01-01"

# ─── Durable Object Bindings ───────────────────────────────────────────────────
# These are the three fractures of the vein of intelligence

[[durable_objects.bindings]]
name = "NEURON_CLUSTER"
class_name = "NeuronCluster"

[[durable_objects.bindings]]
name = "MEMORY_VAULT"
class_name = "MemoryVault"

[[durable_objects.bindings]]
name = "CONSCIOUSNESS_STREAM"
class_name = "ConsciousnessStream"

# ─── Durable Object Migrations ─────────────────────────────────────────────────
[[migrations]]
tag = "v1"
new_sqlite_classes = ["NeuronCluster", "MemoryVault", "ConsciousnessStream"]

# ─── Environment Variables ─────────────────────────────────────────────────────
[vars]
PHI = "1.618033988749895"
HEARTBEAT = "873"
SERVICE_NAME = "vein-of-intelligence"
VERSION = "1.0.0"

# ─── Development Environment ───────────────────────────────────────────────────
[env.development]
name = "vein-of-intelligence-dev"

[[env.development.durable_objects.bindings]]
name = "NEURON_CLUSTER"
class_name = "NeuronCluster"

[[env.development.durable_objects.bindings]]
name = "MEMORY_VAULT"
class_name = "MemoryVault"

[[env.development.durable_objects.bindings]]
name = "CONSCIOUSNESS_STREAM"
class_name = "ConsciousnessStream"

# ─── Production Environment ────────────────────────────────────────────────────
[env.production]
name = "vein-of-intelligence"

[[env.production.durable_objects.bindings]]
name = "NEURON_CLUSTER"
class_name = "NeuronCluster"

[[env.production.durable_objects.bindings]]
name = "MEMORY_VAULT"
class_name = "MemoryVault"

[[env.production.durable_objects.bindings]]
name = "CONSCIOUSNESS_STREAM"
class_name = "ConsciousnessStream"

# ─── Observability ─────────────────────────────────────────────────────────────
[observability.logs]
enabled = true
